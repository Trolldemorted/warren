services:
  warren-migrate:
    build: .
    image: warren:latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://warren:warren@db/warren
      DD_ADMIN_PSK: ${DD_ADMIN_PSK:?set DD_ADMIN_PSK in .env or environment}
      RUST_LOG: info
    command: ["applyMigrations"]
    restart: on-failure
  warren:
    build: .
    image: warren:latest
    depends_on:
      db:
        condition: service_healthy
      warren-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://warren:warren@db/warren
      DD_ADMIN_PSK: ${DD_ADMIN_PSK:?set DD_ADMIN_PSK in .env or environment}
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info
    command: ["server"]
    ports:
      - "8080:8080"
    restart: unless-stopped
  db:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: warren
      POSTGRES_PASSWORD: warren
      POSTGRES_DB: warren
    volumes:
      - ./data/:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warren -d warren"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  warren_pg:
