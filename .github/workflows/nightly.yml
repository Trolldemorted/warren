name: Docker Nightly

on:
  push:
    branches:
      - master

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v2

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build -t ghcr.io/trolldemorted/warren:latest .
          docker push ghcr.io/trolldemorted/warren:latest

      - name: Trigger downstream CI
        env:
          GH_TOKEN: ${{ secrets.DOWNSTREAM_PAT }}
        run: |
          gh workflow run nightly.yml --repo Trolldemorted/claude-reversing
