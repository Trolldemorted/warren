name: CI integration

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres@127.0.0.1:5432/warren?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install Atlas
        uses: ariga/setup-atlas@v0

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Build
        run: cargo build --workspace

      - name: Schema drift (empty DB)
        run: cargo test -p warren --test schema_drift -- --ignored --nocapture

      - name: Schema drift (populated DB)
        run: cargo test -p warren --test schema_drift_populated -- --ignored --nocapture

      - name: OpenAPI drift
        run: cargo test -p warren --test openapi_drift -- --nocapture

      - name: Warren test suite
        run: cargo test -p warren -- --test-threads=1
