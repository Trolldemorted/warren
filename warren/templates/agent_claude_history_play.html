{% extends "base.html" %}
{% block body %}
<link rel="stylesheet" href="/static/vendor/asciinema-player/asciinema-player.css">
<style>
.history-play { max-width: 80rem; }
.history-play .player-wrap {
  background: #0d1117;
  border-radius: .5rem;
  padding: .5rem;
}
.history-play .meta {
  font-family: ui-monospace, monospace;
  color: #8b949e;
  font-size: .85rem;
  margin-top: .5rem;
}
</style>
<div class="history-play">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">history · {{ agent.name }} · <code>{{ session_id }}</code></h1>
    <div>
      <a class="btn btn-sm btn-outline-secondary" href="/agent/{{ agent.id }}/claude/history">← list</a>
      <a class="btn btn-sm btn-outline-secondary" href="/agent/{{ agent.id }}/claude">← claude</a>
    </div>
  </div>
  <div class="player-wrap">
    <asciinema-player src="{{ cast_url }}" idle-time-limit="2" autoplay></asciinema-player>
  </div>
  <div class="meta">
    source: <a href="{{ cast_url }}"><code>{{ cast_url }}</code></a>
  </div>
</div>
<script src="/static/vendor/asciinema-player/asciinema-player.js"></script>
{% endblock %}
