{% extends "base.html" %}
{% block body %}
<h1 class="h3 mb-3">{% if let Some(c) = channel %}Edit channel{% else %}New channel{% endif %}</h1>
<form method="post" action="{{ form_action }}" class="col-md-8">
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Sender class</label>
      <input type="text" name="sender_class" class="form-control" required
        {% if let Some(c) = channel %}value="{{ c.sender_class }}"{% endif %}>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Sender kind (blank = any)</label>
      <input type="text" name="sender_kind" class="form-control"
        {% if let Some(c) = channel %}{% if let Some(k) = c.sender_kind %}value="{{ k }}"{% endif %}{% endif %}>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6 mb-3">
      <label class="form-label">Receiver class</label>
      <input type="text" name="receiver_class" class="form-control" required
        {% if let Some(c) = channel %}value="{{ c.receiver_class }}"{% endif %}>
    </div>
    <div class="col-md-6 mb-3">
      <label class="form-label">Receiver kind (blank = any)</label>
      <input type="text" name="receiver_kind" class="form-control"
        {% if let Some(c) = channel %}{% if let Some(k) = c.receiver_kind %}value="{{ k }}"{% endif %}{% endif %}>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="2" required>{% if let Some(c) = channel %}{{ c.description }}{% endif %}</textarea>
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="/admin/channels" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
