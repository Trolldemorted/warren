<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{% if let Some(t) = title %}{{ t }} · warren{% else %}warren{% endif %}{% endblock %}</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap.min.css">
  <style>
    body { padding-top: 4.5rem; }
    .table { table-layout: fixed; width: 100%; }
    .table > thead,
    .table > tbody { vertical-align: top; }
    .table th { white-space: nowrap; }
    .table pre.payload {
      background: #f5f5f5;
      padding: .5rem;
      border-radius: .25rem;
      max-height: 12rem;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 0;
      font-size: .8125rem;
    }
    .modal-body pre.payload {
      background: #f5f5f5;
      padding: 1rem;
      border-radius: .25rem;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      margin-bottom: 0;
      font-size: .875rem;
    }
    a.payload-link { display: block; color: inherit; text-decoration: none; cursor: pointer; }
    a.payload-link:hover pre.payload,
    a.payload-link:focus pre.payload { background: #e9ecef; }
    .cell-pending { background-color: #fde68a; }
    .cell-pending.responsible-source { box-shadow: inset 4px 0 0 0 #d97706; }
    .cell-pending.responsible-target { box-shadow: inset 4px 0 0 0 #d97706; }
    @media (max-width: 575.98px) {
      main.container { padding-left: 0; padding-right: 0; }
    }
    .modal { display: none; position: fixed; inset: 0; z-index: 1050; overflow: auto; padding: 1rem; }
    .modal:target { display: block; }
    .modal-bg { display: block; position: fixed; inset: 0; z-index: 0; cursor: default; }
    .modal-dialog {
      position: relative;
      z-index: 1;
      pointer-events: auto;
      background: #fff;
      border-radius: .5rem;
      max-width: 60rem;
      margin: 2rem auto;
      box-shadow: 0 .5rem 1rem rgba(0,0,0,.15);
      max-height: calc(100vh - 4rem);
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .75rem 1rem;
      border-bottom: 1px solid #dee2e6;
      background: #fff;
      border-top-left-radius: .5rem;
      border-top-right-radius: .5rem;
    }
    .modal-title { font-size: 1rem; margin: 0; overflow-wrap: anywhere; }
    .modal-body { padding: 1rem; overflow: auto; flex: 1 1 auto; }
    .modal-close {
      font-size: 1.5rem;
      line-height: 1;
      text-decoration: none;
      color: #000;
      background: none;
      border: 0;
      padding: 0 .25rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">warren</a>
      {% if let Some(_) = nav %}
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if nav == Some("agents") %}active{% endif %}" href="/admin/agents">Agents</a></li>
        <li class="nav-item"><a class="nav-link {% if nav == Some("comms") %}active{% endif %}" href="/admin/comms">Comms</a></li>
        <li class="nav-item"><a class="nav-link {% if nav == Some("channels") %}active{% endif %}" href="/admin/channels">Channels</a></li>
        <li class="nav-item"><a class="nav-link {% if nav == Some("migrations") %}active{% endif %}" href="/admin/migrations">Migrations</a></li>
      </ul>
      <form method="post" action="/logout" class="d-flex">
        <button class="btn btn-outline-light btn-sm" type="submit">Sign out</button>
      </form>
      {% endif %}
    </div>
  </nav>
  <main class="container-fluid">
    {% if let Some(flash) = flash %}
    <div class="alert alert-{{ flash.level }} mt-3" role="alert">{{ flash.message }}</div>
    {% endif %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>
