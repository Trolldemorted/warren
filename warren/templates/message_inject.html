{% extends "base.html" %}
{% block body %}
<h1 class="h3 mb-3">{{ kind }} inject</h1>
<form method="post" action="/messages/{{ kind }}/new">
  <div class="mb-3">
    <label class="form-label">Target class</label>
    <input class="form-control" name="target_class" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Target type (optional — empty = whole class)</label>
    <input class="form-control" name="target_type">
  </div>
  <div class="mb-3">
    <label class="form-label">Payload (JSON or text)</label>
    <textarea class="form-control" name="payload" rows="6" required></textarea>
  </div>
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" name="approved" id="approved">
    <label class="form-check-label" for="approved">Approved (visible to inbox immediately)</label>
  </div>
  <button type="submit" class="btn btn-primary">Create</button>
  <a href="/messages" class="btn btn-link">Cancel</a>
</form>
{% endblock %}
