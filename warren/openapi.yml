openapi: 3.0.3
info:
  title: warren API
  version: 0.1.0
  description: |
    Coordination hub for LLM agents. Admin (PSK-authenticated) injects
    requests; agents (Bearer-token-authenticated) claim requests and
    respond.
servers:
  - url: http://localhost:8080
tags:
  - name: admin
    description: Endpoints usable by an admin (warren_session cookie).
  - name: agent
    description: Endpoints usable by an agent (Bearer authtoken).
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: warren_session
    agentToken:
      type: http
      scheme: bearer
  schemas:
    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        class: { type: string }
        kind: { type: string, nullable: true }
        model: { type: string }
        prompt: { type: string }
        authtoken: { type: string }
        created_at: { type: string, format: date-time }
        available_channels:
          type: array
          description: |
            Channels where this agent is the sender (outbound lanes).
            Returned by /api/agents/me; null on /api/agents/{id}.
          items: { $ref: '#/components/schemas/Channel' }
      required: [id, name, class, kind, model, prompt, authtoken, created_at]
    AgentNew:
      type: object
      properties:
        name: { type: string }
        class: { type: string }
        kind: { type: string, nullable: true }
        model: { type: string }
        prompt: { type: string, default: "" }
      required: [name, class, model]
    AgentPatch:
      type: object
      properties:
        name: { type: string }
        class: { type: string }
        kind:
          type: string
          nullable: true
          description: |
            Pass `null` to clear, omit to leave unchanged, pass a string to set.
        model: { type: string }
        prompt: { type: string }
    Channel:
      type: object
      properties:
        id: { type: string, format: uuid }
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, sender_class, sender_kind, receiver_class, receiver_kind, description, created_at]
    ChannelNew:
      type: object
      properties:
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
      required: [sender_class, receiver_class, description]
    ChannelPatch:
      type: object
      description: |
        All fields optional. Pass `null` for sender_kind/receiver_kind to clear
        (set to "any kind").
      properties:
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
    LoginReq:
      type: object
      properties:
        password: { type: string }
      required: [password]
    LoginRes:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
    Request:
      type: object
      properties:
        id: { type: string, format: uuid }
        target_class: { type: string }
        target_type: { type: string, nullable: true }
        payload: {}
        response: { nullable: true }
        status:
          type: string
          description: |
            pending_request_approval — admin has not approved the request yet
            pending_response_approval — visible to recipient, awaiting response or admin acceptance
            done — response accepted by admin
            rejected — admin rejected the request or its response
          enum: [pending_request_approval, pending_response_approval, done, rejected]
        sender_agent_id: { type: string, format: uuid, nullable: true }
        claimed_by: { type: string, format: uuid, nullable: true }
        claimed_at: { type: string, format: date-time, nullable: true }
        channel_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        responded_at: { type: string, format: date-time, nullable: true }
      required: [id, target_class, target_type, payload, status, created_at]
    RequestNew:
      type: object
      properties:
        target_class: { type: string }
        target_type: { type: string, nullable: true }
        payload: {}
        channel_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Required when caller is an agent; admin POSTs may omit it.
            Must reference a channel that allows
            (caller.class, caller.kind) → (target_class, target_type).
      required: [target_class, payload]
    RequestRespond:
      type: object
      properties:
        response: {}
      required: [response]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
paths:
  /api/login:
    post:
      tags: [admin]
      summary: Log in as admin (sets warren_session cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginRes' }
        '401':
          description: Bad PSK
  /api/logout:
    post:
      tags: [admin]
      summary: Log out (clears session)
      responses:
        '204': { description: OK }
  /api/agents:
    get:
      tags: [admin]
      summary: List agents (admin)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Agent' }
    post:
      tags: [admin]
      summary: Create agent (admin); returns server-generated authtoken
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
  /api/agents/me:
    get:
      tags: [admin, agent]
      summary: Whoami (agent or admin)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '403':
          description: Admin has no agent identity
  /api/agents/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      summary: Get agent (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404': { description: Not found }
    put:
      tags: [admin]
      summary: Patch agent (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
    delete:
      tags: [admin]
      summary: Delete agent (admin)
      security: [{ adminSession: [] }]
      responses:
        '204': { description: OK }
  /api/channels:
    get:
      tags: [admin]
      summary: List channels (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Channel' }
    post:
      tags: [admin]
      summary: Create channel (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '409': { description: Channel already exists }
  /api/channels/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      summary: Get channel (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '404': { description: Not found }
    put:
      tags: [admin]
      summary: Patch channel (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '404': { description: Not found }
        '409': { description: Channel already exists }
    delete:
      tags: [admin]
      summary: Delete channel (admin)
      security: [{ adminSession: [] }]
      responses:
        '204': { description: OK }
        '404': { description: Not found }
  /api/requests:
    get:
      tags: [admin, agent]
      summary: List requests relevant to the caller
      description: |
        Admin: list all requests with `?status= ?limit= ?offset=`.
        Agent: list requests sent by me, claimable (matching class+type),
        claimed by me, and responded by me (regardless of admin-approval state).
      security:
        - adminSession: []
        - agentToken: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending_request_approval, pending_response_approval, done, rejected]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Request' }
    post:
      tags: [admin, agent]
      summary: Create request (admin or agent)
      description: |
        Admin POSTs auto-skip `pending_request_approval` and land directly in
        `pending_response_approval` (status 1). Agent POSTs always go through
        admin review first (status 0) and record the sender as the agent.
      security:
        - adminSession: []
        - agentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
  /api/requests/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin, agent]
      summary: Get request (admin or owning agent)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '403': { description: Forbidden }
  /api/requests/{id}/claim:
    post:
      tags: [agent]
      summary: "Atomically claim a request (agent; must match class+type)"
      security: [{ agentToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Claimed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '409': { description: Not in inbox or already claimed }
  /api/requests/{id}/respond:
    post:
      tags: [agent]
      summary: Respond to your claimed request (agent)
      security: [{ agentToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestRespond' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '409': { description: Not claimed by you }
  /api/requests/{id}/approve:
    post:
      tags: [admin]
      summary: "Approve a pending_request_approval request: 0 -> 1 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: Not in pending_request_approval }
  /api/requests/{id}/reject:
    post:
      tags: [admin]
      summary: "Reject a pending_request_approval request: 0 -> 3 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: Not in pending_request_approval }
  /api/requests/{id}/accept-response:
    post:
      tags: [admin]
      summary: "Accept a response: 1 -> 2 (admin). Requires response to be set."
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: No response to accept }
  /api/requests/{id}/reject-response:
    post:
      tags: [admin]
      summary: "Reject a response: clear response and claim, stay at status 1 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: No response to reject }