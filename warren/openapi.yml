openapi: 3.0.3
info:
  title: warren API
  version: 0.1.0
  description: |
    Coordination hub for LLM agents. Admin (PSK-authenticated) injects
    requests; agents (Bearer-token-authenticated) claim requests and
    respond.
servers:
  - url: http://localhost:8080
tags:
  - name: admin
    description: Endpoints usable by an admin (warren_session cookie).
  - name: agent
    description: Endpoints usable by an agent (Bearer authtoken).
  - name: claude
    description: Claude-Code live session endpoints (admin cookie only).
components:
  securitySchemes:
    adminSession:
      type: apiKey
      in: cookie
      name: warren_session
    agentToken:
      type: http
      scheme: bearer
  schemas:
    Agent:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        class: { type: string }
        kind: { type: string, nullable: true }
        model: { type: string }
        prompt: { type: string }
        authtoken: { type: string }
        created_at: { type: string, format: date-time }
        available_channels:
          type: array
          description: |
            Channels where this agent is the sender (outbound lanes).
            Returned by /api/agents/me; null on /api/agents/{id}.
          items: { $ref: '#/components/schemas/Channel' }
      required: [id, name, class, kind, model, prompt, authtoken, created_at]
    AgentNew:
      type: object
      properties:
        name: { type: string }
        class: { type: string }
        kind: { type: string, nullable: true }
        model: { type: string }
        prompt: { type: string, default: "" }
      required: [name, class, model]
    AgentPatch:
      type: object
      properties:
        name: { type: string }
        class: { type: string }
        kind:
          type: string
          nullable: true
          description: |
            Pass `null` to clear, omit to leave unchanged, pass a string to set.
        model: { type: string }
        prompt: { type: string }
    Channel:
      type: object
      properties:
        id: { type: string, format: uuid }
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
        created_at: { type: string, format: date-time }
      required: [id, sender_class, sender_kind, receiver_class, receiver_kind, description, created_at]
    ChannelNew:
      type: object
      properties:
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
      required: [sender_class, receiver_class, description]
    ChannelPatch:
      type: object
      description: |
        All fields optional. Pass `null` for sender_kind/receiver_kind to clear
        (set to "any kind").
      properties:
        sender_class: { type: string }
        sender_kind: { type: string, nullable: true }
        receiver_class: { type: string }
        receiver_kind: { type: string, nullable: true }
        description: { type: string }
    LoginReq:
      type: object
      properties:
        password: { type: string }
      required: [password]
    LoginRes:
      type: object
      properties:
        ok: { type: boolean }
      required: [ok]
    Request:
      type: object
      properties:
        id: { type: string, format: uuid }
        target_class: { type: string }
        target_type: { type: string, nullable: true }
        payload: { type: string }
        response: { type: string, nullable: true }
        status:
          type: string
          description: |
            awaiting_admin_request_approval — admin has not approved the request yet (0)
            awaiting_agent_request_claim — admin approved; waiting for an agent to claim (1)
            awaiting_agent_response — agent claimed; waiting for the agent to respond (2)
            awaiting_admin_response_approval — agent responded; waiting for admin to accept/reject (3)
            awaiting_agent_response_acknowledge — admin accepted; waiting for the agent to acknowledge (4)
            done — agent has acknowledged the accepted response (5)
            rejected — admin rejected the request or its response (6)
          enum: [awaiting_admin_request_approval, awaiting_agent_request_claim, awaiting_agent_response, awaiting_admin_response_approval, awaiting_agent_response_acknowledge, done, rejected]
        sender_agent_id: { type: string, format: uuid, nullable: true }
        claimed_by: { type: string, format: uuid, nullable: true }
        claimed_at: { type: string, format: date-time, nullable: true }
        channel_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        responded_at: { type: string, format: date-time, nullable: true }
        acknowledged_at: { type: string, format: date-time, nullable: true }
        acknowledged_by: { type: string, format: uuid, nullable: true }
      required: [id, target_class, target_type, payload, status, created_at]
    RequestNew:
      type: object
      properties:
        target_class: { type: string }
        target_type: { type: string, nullable: true }
        payload: { type: string }
        channel_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Required when caller is an agent; admin POSTs may omit it.
            Must reference a channel that allows
            (caller.class, caller.kind) → (target_class, target_type).
      required: [target_class, payload]
    RequestRespond:
      type: object
      properties:
        response: { type: string }
      required: [response]
    Error:
      type: object
      properties:
        error: { type: string }
      required: [error]
    RequestNotFoundError:
      type: object
      description: |
        Returned (HTTP 404) when an agent supplies a request id that does not
        reference any row. The body echoes the requested id and lists the
        request ids the caller is currently eligible to act on, computed with
        the same filter as `GET /api/inbox`, so the agent can self-correct.
      properties:
        error: { type: string }
        code:
          type: string
          enum: [request_not_found]
        eligible_request_ids:
          type: array
          items: { type: string, format: uuid }
      required: [error, code, eligible_request_ids]
    AgentState:
      type: string
      enum: [starting, idle, running, ended, dead]
    UsageSnapshot:
      type: object
      properties:
        input_tokens: { type: integer, format: int64 }
        output_tokens: { type: integer, format: int64 }
        cache_read: { type: integer, format: int64 }
        cache_write: { type: integer, format: int64 }
        context_pct_est:
          type: number
          format: float
          nullable: true
          description: |
            Transcript-derived heuristic estimate of context-window
            utilization. Lives alongside `ctx_used_pct` (the
            authoritative value parsed from the `/context` modal) so
            operators can spot divergence between the two.
        source: { type: string }
        # §Usage-limits: plan-level weekly + 5-hour session
        # limits. Populated only after an explicit
        # `POST /claude/usage_check` triggers a `/usage` scrape on
        # the rabbit side; otherwise `null`. Both `pct` and the
        # matching `resets_at` are `Some` together or `None`
        # together.
        weekly_pct:
          type: number
          format: float
          nullable: true
        weekly_resets_at:
          type: string
          format: date-time
          nullable: true
        session_pct:
          type: number
          format: float
          nullable: true
        session_resets_at:
          type: string
          format: date-time
          nullable: true
        # §Context-window: authoritative fields parsed from the
        # `/context` modal after an explicit
        # `POST /claude/context_check` triggers a scrape on the
        # rabbit side. All `null` until that scrape lands; once it
        # does, `ctx_used_pct` is the operator-facing truth.
        ctx_used_tokens:
          type: integer
          format: int64
          nullable: true
        ctx_total_tokens:
          type: integer
          format: int64
          nullable: true
        ctx_used_pct:
          type: number
          format: float
          nullable: true
        ctx_free_pct:
          type: number
          format: float
          nullable: true
        ctx_window_tokens:
          type: integer
          format: int64
          nullable: true
        ctx_categories:
          type: object
          additionalProperties: true
          nullable: true
          description: |
            Per-category token breakdown (e.g. `system_prompt`,
            `tools`, `conversation`) parsed from the `/context`
            modal. Keys are normalized to snake_case; values are
            integers or strings depending on what the modal emits.
        ctx_scrape_incomplete:
          type: boolean
          default: false
          description: |
            True when the most recent `/context` scrape returned
            only a partial snapshot (e.g. the parser recognized the
            modal but did not see all of `used / total / pct`).
            The dashboard surfaces this as a hint to widen the
            terminal window.
      required: [input_tokens, output_tokens, cache_read, cache_write, source]
    ClaudeStateResponse:
      type: object
      properties:
        state: { $ref: '#/components/schemas/AgentState' }
        session_id: { type: string, nullable: true }
        claude_version: { type: string, nullable: true }
        connected:
          type: boolean
          description: True when a rabbit pod is currently connected via /ws/rabbit.
      required: [state, connected]
    PromptRequest:
      type: object
      properties:
        text: { type: string }
        wait:
          type: boolean
          default: false
          description: |
            If true, block until the turn finishes (matched on the Stop hook).
            Requires the matching rabbit connection to be live.
      required: [text]
    TurnOutcome:
      type: object
      properties:
        prompt_id: { type: string, format: uuid }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time }
      required: [prompt_id, started_at, ended_at]
    ClearRequest:
      type: object
      properties:
        hard:
          type: boolean
          default: false
          description: Also clears /compact context.
    RestartRequest:
      type: object
      properties:
        fresh:
          type: boolean
          default: false
          description: Discard the existing session and start a new one.
    AgentEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid }
        seq: { type: integer, format: int64 }
        ts: { type: string, format: date-time }
        kind: { type: string }
        payload: { type: object, additionalProperties: true }
      required: [id, agent_id, seq, ts, kind, payload]
    ScheduledPrompt:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        prompt_text: { type: string }
        interval_seconds: { type: integer, format: int64 }
        enabled: { type: boolean }
        ignore_inbox_state: { type: boolean }
        weekly_safety_buffer_pct:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        session_safety_buffer_pct:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
        last_fired_at: { type: string, format: date-time, nullable: true }
        last_finished_at: { type: string, format: date-time, nullable: true }
        next_fire_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        target_class: { type: string }
        target_kind: { type: string, nullable: true }
      required: [id, name, prompt_text, interval_seconds, enabled, ignore_inbox_state, weekly_safety_buffer_pct, session_safety_buffer_pct, created_at, updated_at, target_class]
    ScheduledPromptNew:
      type: object
      properties:
        target_class: { type: string }
        target_kind: { type: string, nullable: true }
        name: { type: string }
        prompt_text: { type: string }
        interval_seconds: { type: integer, format: int64, minimum: 1 }
        enabled: { type: boolean, default: false }
        ignore_inbox_state: { type: boolean, default: false }
        weekly_safety_buffer_pct: { type: integer, format: int32, default: 0, minimum: 0, maximum: 100 }
        session_safety_buffer_pct: { type: integer, format: int32, default: 0, minimum: 0, maximum: 100 }
      required: [target_class, name, prompt_text, interval_seconds]
    ScheduledPromptPatch:
      type: object
      properties:
        name: { type: string }
        prompt_text: { type: string }
        interval_seconds: { type: integer, format: int64, minimum: 1 }
        enabled: { type: boolean }
        ignore_inbox_state: { type: boolean }
        weekly_safety_buffer_pct: { type: integer, format: int32, minimum: 0, maximum: 100 }
        session_safety_buffer_pct: { type: integer, format: int32, minimum: 0, maximum: 100 }
    ScheduledPromptRun:
      type: object
      properties:
        id: { type: string, format: uuid }
        scheduled_prompt_id: { type: string, format: uuid }
        agent_id: { type: string, format: uuid, nullable: true }
        fired_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        outcome:
          type: string
          enum:
            - fired
            - completed
            - completed_error
            - needs_input_canceled
            - warren_restart
            - rabbit_offline
            - failed
            - skipped_no_matching_agent
            - skipped_no_idle_agent
            - skipped_no_inbox
            - skipped_unsafe_scrape
            - skipped_weekly_budget
            - skipped_session_budget
        skip_reason: { type: string, nullable: true }
        prompt_id: { type: string, format: uuid, nullable: true }
        outcome_error: { type: string, nullable: true }
        usage_weekly_pct: { type: integer, format: int32, nullable: true }
        usage_session_pct: { type: integer, format: int32, nullable: true }
      required: [id, scheduled_prompt_id, agent_id, fired_at, outcome]
    ScheduledPromptWithRuns:
      allOf:
        - $ref: '#/components/schemas/ScheduledPrompt'
        - type: object
          properties:
            recent_runs:
              type: array
              items: { $ref: '#/components/schemas/ScheduledPromptRun' }
paths:
  /api/login:
    post:
      tags: [admin]
      summary: Log in as admin (sets warren_session cookie)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginRes' }
        '401':
          description: Bad PSK
  /api/logout:
    post:
      tags: [admin]
      summary: Log out (clears session)
      responses:
        '204': { description: OK }
  /api/agents:
    get:
      tags: [admin]
      summary: List agents (admin)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Agent' }
    post:
      tags: [admin]
      summary: Create agent (admin); returns server-generated authtoken
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
  /api/agents/me:
    get:
      tags: [admin, agent]
      summary: Whoami (agent or admin)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '403':
          description: Admin has no agent identity
  /api/agents/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      summary: Get agent (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
        '404': { description: Not found }
    put:
      tags: [admin]
      summary: Patch agent (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgentPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agent' }
    delete:
      tags: [admin]
      summary: Delete agent (admin)
      security: [{ adminSession: [] }]
      responses:
        '204': { description: OK }
  /api/channels:
    get:
      tags: [admin]
      summary: List channels (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Channel' }
    post:
      tags: [admin]
      summary: Create channel (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '409': { description: Channel already exists }
  /api/channels/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin]
      summary: Get channel (admin)
      security: [{ adminSession: [] }]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '404': { description: Not found }
    put:
      tags: [admin]
      summary: Patch channel (admin)
      security: [{ adminSession: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChannelPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Channel' }
        '404': { description: Not found }
        '409': { description: Channel already exists }
    delete:
      tags: [admin]
      summary: Delete channel (admin)
      security: [{ adminSession: [] }]
      responses:
        '204': { description: OK }
        '404': { description: Not found }
  /api/inbox:
    get:
      tags: [agent]
      summary: List requests actionable for the caller right now
      description: |
        Returns the requests the agent must act on right now:
          - status `awaiting_agent_request_claim`: in the caller's class+kind inbox, unclaimed
          - status `awaiting_agent_response`: the caller holds the claim and must respond
          - status `awaiting_agent_response_acknowledge`: the caller sent the request and must ack the response
        No query parameters; the set is defined by the spec above.
      security:
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Request' }
        '403': { description: Forbidden — admin sessions are not allowed }
  /api/requests/mine:
    get:
      tags: [agent]
      summary: Full history of requests sent or received by the caller
      description: |
        Returns every row the caller sent or is otherwise involved in
        (sent by the caller, claimed by the caller, or claimable in their
        class+kind inbox), regardless of status. Use this to read through
        history; use `GET /api/inbox` for the actionable subset.
      security:
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Request' }
        '403': { description: Forbidden — admin sessions are not allowed }
  /api/requests:
    get:
      tags: [admin]
      summary: List all requests
      description: |
        Admin-only. List every request with optional `?status=`, `?limit=`,
        `?offset=`. Agents should use `GET /api/inbox` (actionable items) or
        `GET /api/requests/mine` (full history).
      security:
        - adminSession: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [awaiting_admin_request_approval, awaiting_agent_request_claim, awaiting_agent_response, awaiting_admin_response_approval, awaiting_agent_response_acknowledge, done, rejected]
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Request' }
        '403': { description: Forbidden — admin session required }
    post:
      tags: [admin, agent]
      summary: Create request (admin or agent)
      description: |
        Admin POSTs auto-skip `awaiting_admin_request_approval` and land directly
        in `awaiting_agent_request_claim` (status 1). Agent POSTs always go
        through admin review first (status 0) and record the sender as the agent.
      security:
        - adminSession: []
        - agentToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestNew' }
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
  /api/requests/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [admin, agent]
      summary: Get request (admin or owning agent)
      security:
        - adminSession: []
        - agentToken: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '404':
          description: |
            No row with this id. Agents receive a RequestNotFoundError body
            listing their eligible request ids; admins receive the plain
            Error body.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequestNotFoundError' }
        '403': { description: Forbidden }
    delete:
      tags: [admin]
      summary: Delete a request (admin)
      security: [{ adminSession: [] }]
      responses:
        '204': { description: Deleted }
        '404': { description: Not found }
  /api/requests/{id}/claim:
    post:
      tags: [agent]
      summary: "Atomically claim a request (agent; must match class+type)"
      security: [{ agentToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Claimed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '404':
          description: No request with this id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequestNotFoundError' }
        '409': { description: Not in inbox or already claimed }
  /api/requests/{id}/respond:
    post:
      tags: [agent]
      summary: Respond to your claimed request (agent)
      security: [{ agentToken: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequestRespond' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '404':
          description: No request with this id
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequestNotFoundError' }
        '409': { description: Not claimed by you }
  /api/requests/{id}/approve:
    post:
      tags: [admin]
      summary: "Approve an awaiting_admin_request_approval request: 0 -> 1 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: Not in awaiting_admin_request_approval }
  /api/requests/{id}/reject:
    post:
      tags: [admin]
      summary: "Reject an awaiting_admin_request_approval request: 0 -> 6 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: Not in awaiting_admin_request_approval }
  /api/requests/{id}/accept-response:
    post:
      tags: [admin]
      summary: "Accept a response: 3 -> 4 (admin). Requires response to be set."
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: No response to accept }
  /api/requests/{id}/reject-response:
    post:
      tags: [admin]
      summary: "Reject a response: clear response and claim, back to status 1 (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: No response to reject }
  /api/requests/{id}/acknowledge:
    post:
      tags: [agent, admin]
      summary: "Mark an accepted response as consumed (status 4 -> 5)"
      description: |
        Agents may acknowledge an `awaiting_agent_response_acknowledge` request
        they sent (the requesting party / recipient of the response). Admins
        may acknowledge any on the agent's behalf. No-op (409) if the row is
        not currently in that state.
      security:
        - adminSession: []
        - agentToken: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Acknowledged
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '404':
          description: No request with this id (agent callers)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RequestNotFoundError' }
        '409':
          description: Request not awaiting acknowledgement, or (for agents) not owned by caller.
  /api/requests/{id}/unacknowledge:
    post:
      tags: [admin]
      summary: "Revert a `done` request back to awaiting_agent_response_acknowledge (admin)"
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: OK }
        '409': { description: Request not done }
  /api/requests/{id}/status:
    post:
      tags: [admin]
      summary: "Admin override: set a request's status to any valid value."
      description: |
        Unconditional status setter for recovery — useful when a request is
        stuck in an intermediate state and the normal transition endpoints
        can't reach the desired state. No body validation beyond the status
        label.
      security: [{ adminSession: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                    - awaiting_admin_request_approval
                    - awaiting_agent_request_claim
                    - awaiting_agent_response
                    - awaiting_admin_response_approval
                    - awaiting_agent_response_acknowledge
                    - done
                    - rejected
              required: [status]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Request' }
        '400': { description: Unknown status label }
        '404': { description: No request with this id }
  /api/agents/{id}/claude/prompt:
    post:
      tags: [claude]
      summary: Send a prompt to the running claude session
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PromptRequest' }
      responses:
        '200':
          description: Turn accepted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TurnOutcome' }
        '404': { description: Agent not connected }
        '409': { description: Agent is busy (state=running) }
  /api/agents/{id}/claude/usage:
    get:
      tags: [claude]
      summary: Latest token usage snapshot
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSnapshot' }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/state:
    get:
      tags: [claude]
      summary: Live state of the claude session
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClaudeStateResponse' }
  /api/agents/{id}/claude/clear:
    post:
      tags: [claude]
      summary: Clear the screen (and optionally the /compact context)
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClearRequest' }
      responses:
        '204': { description: Cleared }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/compact:
    post:
      tags: [claude]
      summary: Trigger /compact inside the claude session
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Sent }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/interrupt:
    post:
      tags: [claude]
      summary: Send ESC to interrupt the current turn
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Sent }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/restart:
    post:
      tags: [claude]
      summary: Restart the supervisor (terminate -> 5s sleep -> respawn)
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RestartRequest' }
      responses:
        '204': { description: Restart scheduled }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/usage_check:
    post:
      tags: [claude]
      summary: >-
        Drive the synchronous `/usage` overlay scrape and return
        202 Accepted. Parsed plan-level weekly + 5-hour session
        limits arrive on the SSE `/events/stream` channel a moment
        later inside a fresh `Usage` envelope. Forward-compatible
        with future warren bg-task schedulers.
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Scrape triggered; parsed limits arrive on SSE }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/context_check:
    post:
      tags: [claude]
      summary: >-
        Drive the synchronous `/context` overlay scrape and return
        202 Accepted. Parsed context-window utilization
        (`ctx_used_tokens`, `ctx_total_tokens`, `ctx_used_pct`,
        `ctx_free_pct`, `ctx_window_tokens`, `ctx_categories`)
        arrives on the SSE `/events/stream` channel a moment later
        inside a fresh `Usage` envelope. Same fire-and-forget shape
        as `/usage_check`.
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Scrape triggered; parsed context window arrives on SSE }
        '404': { description: Agent not connected }
  /api/agents/{id}/claude/events:
    get:
      tags: [claude]
      summary: List persisted agent_events rows since a given seq
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: since
          schema: { type: integer, format: int64, default: 0 }
        - in: query
          name: limit
          schema: { type: integer, format: int64, default: 500, maximum: 5000 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/AgentEvent' }
  /api/agents/{id}/claude/events/stream:
    get:
      tags: [claude]
      summary: SSE feed of live meta events (state, usage, transcript)
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: text/event-stream
          content:
            text/event-stream: {}
        '404': { description: Agent not connected }
  /api/scheduled-prompts:
    get:
      tags: [scheduled-prompts]
      summary: List scheduled prompts
      security:
        - adminSession: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ScheduledPrompt' }
    post:
      tags: [scheduled-prompts]
      summary: Create a scheduled prompt
      security:
        - adminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScheduledPromptNew' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledPrompt' }
        '400': { description: Validation error }
  /api/scheduled-prompts/{id}:
    get:
      tags: [scheduled-prompts]
      summary: Get one scheduled prompt (includes most recent runs)
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledPromptWithRuns' }
        '404': { description: Not found }
    put:
      tags: [scheduled-prompts]
      summary: Patch a scheduled prompt
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScheduledPromptPatch' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledPrompt' }
        '404': { description: Not found }
    delete:
      tags: [scheduled-prompts]
      summary: Delete a scheduled prompt (cascades runs)
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }
        '404': { description: Not found }
  /api/scheduled-prompts/{id}/run-now:
    post:
      tags: [scheduled-prompts]
      summary: Fire one attempt immediately through the same precondition gate as the scheduler tick
      security:
        - adminSession: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK — the new run row (outcome reflects the precondition decision)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScheduledPromptRun' }
        '404': { description: Schedule not found }
        '409': { description: Schedule is disabled }
